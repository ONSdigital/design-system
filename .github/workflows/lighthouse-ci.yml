name: Lighthouse CI accessibility checks
on: [pull_request]

concurrency:
  group: lighthouse-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
    contents: read

env:
    SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
    lhci-prepare-assets:
        name: Lighthouse CI prepare assets
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
            - name: Install Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'yarn'
            - name: Install dependencies
              run: yarn install
            - name: Build pages
              run: yarn build
            - name: Build urls
              run: node ./lighthouse/lighthouse-get-urls.js
            - name: Build sharded urls
              run: |
                  for shard in 0 1 2 3; do
                      LHCI_SHARD_INDEX="$shard" LHCI_SHARD_COUNT=4 node ./lighthouse/lighthouse-get-urls.js
                      cp lighthouse/urls.json "lighthouse/urls.shard-${shard}.json"
                  done
                  LHCI_SHARD_INDEX=0 LHCI_SHARD_COUNT=1 node ./lighthouse/lighthouse-get-urls.js
            - name: Upload Lighthouse assets
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: lhci-assets
                  path: |
                      build
                      lighthouse/urls.json
                      lighthouse/urls.shard-*.json

    lhci-known-issues:
        name: Lighthouse CI on urls with known issues
        runs-on: ubuntu-latest
        needs: lhci-prepare-assets
        steps:
            - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
            - name: Install Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'yarn'
            - name: Download Lighthouse assets
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              with:
                  name: lhci-assets
                  path: .
            - name: Run Lighthouse CI
              run: |
                  npm install -g @lhci/cli@0.14.x
                  lhci collect --config=./lighthouse/lighthouserc.skipAriaAllowed.js
                  if ! lhci assert --config=./lighthouse/lighthouserc.skipAriaAllowed.js; then
                  echo "Assertions failed"
                  lhci upload --config=./lighthouse/lighthouserc.skipAriaAllowed.js
                  exit 1
                  else
                  echo "Assertions passed, skipping upload."
                  fi
              env:
                  LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

    lhci-without-known-issues-sharded:
        name: Lighthouse CI on urls without known issues (${{ matrix.shard_index }})
        runs-on: ubuntu-latest
        needs: lhci-prepare-assets
        strategy:
            fail-fast: false
            matrix:
                shard_index: [0, 1, 2, 3]

        env:
            LHCI_SHARD_INDEX: ${{ matrix.shard_index }}
            LHCI_SHARD_COUNT: 4

        steps:
            - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
            - name: Install Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'yarn'
            - name: Download Lighthouse assets
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              with:
                  name: lhci-assets
                  path: .
            - name: Select urls for shard
              run: cp "lighthouse/urls.shard-${LHCI_SHARD_INDEX}.json" lighthouse/urls.json
            - name: Print shard info
              run: echo "Running Lighthouse shard ${LHCI_SHARD_INDEX}/${LHCI_SHARD_COUNT}"
            - name: Run Lighthouse CI
              run: |
                  npm install -g @lhci/cli@0.14.x
                  lhci collect --config=./lighthouse/lighthouserc.js
                  if ! lhci assert --config=./lighthouse/lighthouserc.js; then
                  echo "Assertions failed"
                  lhci upload --config=./lighthouse/lighthouserc.js
                  exit 1
                  else
                  echo "Assertions passed, skipping upload."
                  fi
              env:
                  LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

    lhci-without-known-issues:
        name: Lighthouse CI on urls without known issues
        runs-on: ubuntu-latest
        needs: lhci-without-known-issues-sharded
        if: ${{ always() }}

        steps:
            - name: Verify all Lighthouse shards passed
              run: |
                  if [ "${{ needs.lhci-without-known-issues-sharded.result }}" != "success" ]; then
                      echo "One or more Lighthouse shards failed"
                      exit 1
                  fi

                  echo "All Lighthouse shards passed"

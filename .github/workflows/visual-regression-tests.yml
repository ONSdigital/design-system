name: Run visual regression tests
on: [push]

permissions:
    contents: read

env:
    SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    RUNNING_IN_CI: true

jobs:
    run-visual-regression-tests:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                shard_index: [0, 1, 2, 3]

        env:
            VR_SHARD_INDEX: ${{ matrix.shard_index }}
            VR_SHARD_COUNT: 4

        steps:
            - name: Checkout
              uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
              with:
                  lfs: true
            - name: Install Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'yarn'
            - name: Print runtime versions
              run: |
                  node --version
                  npm --version
                  yarn --version
            - name: Print shard info
              run: echo "Running visual regression shard ${VR_SHARD_INDEX}/${VR_SHARD_COUNT}"
            - name: Install dependencies
              run: yarn install
            - name: Set up Docker
              uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
            - name: Run visual regression tests
              id: vr
              run: yarn test-visual
            - name: Print failing Backstop scenarios
              if: ${{ failure() }}
              run: node ci/print-backstop-failures.mjs
            # Archive report artifacts if visual regression tests fail
            - name: Archive BackstopJS reports
              if: ${{ failure() }}
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: backstop-reports-shard-${{ matrix.shard_index }}
                  path: |
                      backstop_data/bitmaps_test
                      backstop_data/html_report
